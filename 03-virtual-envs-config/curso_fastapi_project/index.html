<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Board</title>
    <style>
        :root {
            --bg-color: #0f172a;       /* Dark Slate */
            --card-bg: #1e293b;        /* Lighter Slate */
            --text-primary: #f8fafc;
            --accent: #38bdf8;         /* Sky Blue */
            --error-bg: #450a0a;
            --error-text: #fca5a5;
            --success-bg: #064e3b;
            --success-text: #6ee7b7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            gap: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 300px;
            text-align: center;
        }

        h1 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        #display, #clock {
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        #clock {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 1.2rem;
            color: var(--accent);
        }

        /* Status Classes */
        .error {
            background-color: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-text);
        }

        .success {
            background-color: var(--success-bg);
            color: var(--success-text);
            border: 1px solid var(--success-text);
        }

        /* Subtle loading animation */
        .loading {
            opacity: 0.5;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FastAPI Dashboard</h1>

        <div class="loading" id="display">
            Stablishing connection...
        </div>

        <div class="loading" id="clock">
            Syncing time...
        </div>

    </div>

    <script>
        const base_url = 'http://127.0.0.1:8000';
        
        async function init() {
            await new Promise(resolve => setTimeout(resolve, 1000));
            await fetchAndDisplay('display', 'msg', (data) => data.message);

            await new Promise(resolve => setTimeout(resolve, 1000));
            await fetchAndDisplay('clock', 'time/CO?format=24h', (data) => {
                const clockText = `${data.hour}:${data.minute}:${data.seconds}`;
                return data.meridian? `${clockText} ${data.meridian}` : clockText;
            })
        }
        

        async function fetchAndDisplay(elementId, path, formatter=0) {
            const element = document.getElementById(elementId);
            
            try {
                const response = await fetch(`${base_url}/${path}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const rawData = await response.json();
                
                const displayText = formatter ? formatter(rawData) : rawData;
                element.innerText = displayText;

                // update classess 
                element.classList.remove('loading');
                element.classList.add('success');
                element.innerText = displayText;
                
            } catch (error) {
                element.classList.remove('loading');
                element.classList.add('error');
                element.innerText = 'Connection Error';
                console.error(`Error fetching ${base_url}/${path}`, error);
            }
        }
        
        init();
        </script>
</body>
</html>
